!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="vi<ewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor - EasyToolkit</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,button{
width:100%;
padding:15px;
margin-top:15px;
border-radius:10px;
font-size:16px;
}

button{
background:#2563eb;
color:white;
border:none;
}

img{
width:100%;
margin-top:20px;
border-radius:10px;
display:none;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>🗜️ Image Compressor</h2>

<input type="file" id="image" accept="image/*">

<button id="compressBtn">Compress Image</button>

<img id="preview">

</div>

</div>

<script>
const image = document.getElementById("image");
const compressBtn = document.getElementById("compressBtn");

compressBtn.onclick = function () {

    const file = image.files[0];

    if (!file) {
        alert("Please select an image first.");
        return;
    }

    const img = new Image();

    img.onload = function () {

        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        canvas.toBlob(function(blob){

            const link = document.createElement("a");

            link.href = URL.createObjectURL(blob);
            link.download = "compressed-image.jpg";
            link.click();

        }, "image/jpeg", 0.6);

    };

    img.src = URL.createObjectURL(file);

};

</script>

</body>
