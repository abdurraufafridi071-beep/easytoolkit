<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remove Background - EasyToolkit</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
padding:20px;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

img{
max-width:100%;
margin-top:20px;
display:none;
border-radius:10px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

a.home{
display:inline-block;
margin-top:20px;
text-decoration:none;
background:#2563eb;
color:white;
padding:10px 15px;
border-radius:8px;
}
</style>

</head>
<body>

<div class="container">

<h2>🖼 Remove Background</h2>

<input type="file" id="imageInput" accept="image/*">

<img id="preview">

<button onclick="removeBg()">Remove Background</button>

<br>

<a id="downloadBtn" style="display:none;">⬇ Download PNG</a>

</div>

<a href="index.html" class="home">← Home</a>

<script>

const API_KEY="nJQfXqVX343Qb85fgNg9SC41";

const input=document.getElementById("imageInput");
const preview=document.getElementById("preview");

input.onchange=function(){

const file=this.files[0];

if(file){

preview.src=URL.createObjectURL(file);

preview.style.display="block";

}

}

async function removeBg(){

const file=input.files[0];

if(!file){

alert("Please select an image.");

return;

}

const formData=new FormData();

formData.append("image_file",file);

formData.append("size","auto");

const response=await fetch("https://api.remove.bg/v1.0/removebg",{

method:"POST",

headers:{
"X-Api-Key":API_KEY
},

body:formData

});

if(!response.ok){

alert("Background removal failed.");

return;

}

const blob=await response.blob();

const url=URL.createObjectURL(blob);

preview.src=url;

const download=document.getElementById("downloadBtn");

download.href=url;

download.download="removed-background.png";

download.style.display="inline-block";

download.innerHTML="⬇ Download PNG";

}

</script>

</body>
  </html>
